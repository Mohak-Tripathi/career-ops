# Portal Scanner Configuration — Mohak Tripathi
# Targeting: Backend SDE2/SDE3 roles at Indian unicorns + select global companies
# Updated: 2026-06-24

title_filter:
  positive:
    # Backend / SWE roles
    - "Backend Engineer"
    - "Backend Developer"
    - "Software Engineer"
    - "Software Developer"
    - "SDE"
    - "SDE2"
    - "SDE-2"
    - "SDE 2"
    - "SDE3"
    - "Senior Software Engineer"
    - "Senior Backend"
    - "Senior Engineer"
    - "Platform Engineer"
    - "Full Stack Engineer"
    - "Full Stack Developer"
    - "Node.js"
    - "Node JS"
    # API / system design signals
    - "API Engineer"
    - "GraphQL"
    - "Distributed Systems"
    # AI integration angle
    - "AI Engineer"
    - "ML Engineer"
    - "LLM"
    - "GenAI"
    - "Agentic"
  negative:
    - "Junior"
    - "Intern"
    - "Fresher"
    - "Trainee"
    - "Data Scientist"
    - "Data Analyst"
    - "iOS"
    - "Android"
    - "Mobile"
    - "React Native"
    - "DevOps"
    - "SRE"
    - "QA"
    - "Test Engineer"
    - "Security Engineer"
    - "Embedded"
    - "Firmware"
    - "Hardware"
    - "COBOL"
    - "SAP"
    - "Mainframe"
    - "PHP"
    - "Java "
    - ".NET"
    - "C# "
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Sales"
    - "Marketing"
    - "HR"
    - "Finance"
    - "Operations"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "SDE2"
    - "SDE3"

search_queries:
  # -- LinkedIn India searches --
  - name: LinkedIn — Backend SDE2 Bangalore
    query: 'site:linkedin.com/jobs "Backend Engineer" OR "SDE2" OR "Senior Software Engineer" Bangalore "Node.js" OR "TypeScript" OR "GraphQL"'
    enabled: true

  - name: LinkedIn — Backend Engineer Indian Unicorns
    query: 'site:linkedin.com/jobs "Backend Engineer" OR "Software Engineer" "Razorpay" OR "CRED" OR "PhonePe" OR "Swiggy" OR "Groww" OR "Meesho"'
    enabled: true

  - name: LinkedIn — SDE2 Remote India
    query: 'site:linkedin.com/jobs "SDE2" OR "SDE-2" OR "Senior Backend Engineer" India remote "Node.js" OR "TypeScript"'
    enabled: true

  # -- Naukri searches --
  - name: Naukri — Senior Backend Engineer Bangalore
    query: 'site:naukri.com "Senior Backend Engineer" OR "SDE2" OR "Backend Developer" Bangalore "Node.js" OR "TypeScript" OR "GraphQL"'
    enabled: true

  - name: Naukri — Software Engineer Unicorn
    query: 'site:naukri.com "Software Engineer" "5-8 years" OR "3-6 years" Bangalore fintech OR SaaS'
    enabled: true

  # -- Instahyre / AngelList India --
  - name: Instahyre — Backend Engineer
    query: 'site:instahyre.com "Backend Engineer" OR "SDE2" OR "Senior Software Engineer" Bangalore'
    enabled: true

  - name: AngelList / Wellfound — Indian Startups Backend
    query: 'site:wellfound.com/jobs "Backend Engineer" OR "SDE" India Bangalore "Node.js" OR "TypeScript"'
    enabled: true

  # -- Global boards for Wave 3 companies --
  - name: Greenhouse — Backend / SDE Global
    query: 'site:job-boards.greenhouse.io "Backend Engineer" OR "Senior Software Engineer" India OR Bangalore OR remote'
    enabled: true

  - name: Ashby — Backend Engineer
    query: 'site:jobs.ashbyhq.com "Backend Engineer" OR "Software Engineer" India OR Bangalore OR remote'
    enabled: true

  - name: Lever — Backend Engineer India
    query: 'site:jobs.lever.co "Backend Engineer" OR "Senior Software Engineer" India OR Bangalore OR remote'
    enabled: true

  # -- Remote-first global (Wave 3) --
  - name: Remote OK — Backend / Node.js
    query: 'site:remoteok.com "Backend Engineer" OR "Node.js Engineer" OR "Senior Software Engineer" India OR remote'
    enabled: true

  - name: Himalayas — Remote Backend India
    query: 'site:himalayas.app "Backend Engineer" OR "Software Engineer" India OR remote "Node.js" OR "TypeScript"'
    enabled: true

  # ── LAYER 4 — Channel searches (high volume, run daily) ───────────────────

  - name: CutShort — Backend SDE2 Bangalore
    query: 'site:cutshort.io "Backend Engineer" OR "SDE2" OR "Software Engineer" Bengaluru OR Bangalore "Node.js" OR "TypeScript" OR "GraphQL"'
    enabled: true

  - name: CutShort — Backend Node.js India
    query: 'site:cutshort.io "Backend Engineer" OR "Backend Developer" India "Node.js" OR "TypeScript" 3 OR 4 OR 5 years'
    enabled: true

  - name: CutShort — SDE2 Fintech SaaS
    query: 'site:cutshort.io "SDE2" OR "SDE-2" OR "Senior Software Engineer" fintech OR SaaS Bangalore'
    enabled: true

  - name: Instahyre — Senior Backend Bangalore
    query: 'site:instahyre.com "Senior Backend Engineer" OR "Senior Software Engineer" Bangalore "Node.js" OR "TypeScript" OR "GraphQL"'
    enabled: true

  - name: Instahyre — Backend SDE2 Bangalore
    query: 'site:instahyre.com "Backend Engineer" OR "SDE2" OR "Software Engineer" Bangalore backend'
    enabled: true

  - name: Wellfound — Backend Engineer Bangalore startups
    query: 'site:wellfound.com "Backend Engineer" OR "Software Engineer" Bangalore "Node.js" OR "TypeScript" series OR funded'
    enabled: true

  - name: Wellfound — Node.js India remote
    query: 'site:wellfound.com "Node.js" OR "Node JS" backend engineer India remote OR Bangalore'
    enabled: true

  - name: AngelList — Backend SDE India funded startup
    query: 'site:angel.co "Backend Engineer" OR "SDE2" OR "Software Engineer" India Bangalore funded'
    enabled: true

  - name: Naukri — Backend Node.js 3-6 years Bangalore
    query: 'site:naukri.com "Backend Developer" OR "Backend Engineer" "Node.js" OR "Node JS" "3 to 6" OR "3-6" years Bangalore'
    enabled: true

  - name: Naukri — Senior Backend Engineer Bangalore product
    query: 'site:naukri.com "Senior Backend Engineer" OR "Senior Software Engineer" Bangalore "product" OR "startup" "Node" OR "TypeScript"'
    enabled: true

  - name: iimjobs — Software Engineer IT product Bangalore
    query: 'site:iimjobs.com "Software Engineer" OR "Backend Engineer" Bangalore IT product SaaS'
    enabled: true

  - name: Peerlist — Backend Engineer India
    query: 'site:peerlist.io "Backend Engineer" OR "Software Engineer" India Bangalore "Node.js" OR "TypeScript"'
    enabled: true

