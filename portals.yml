# Portal Scanner Configuration — Mohak Tripathi
# Targeting: Backend SDE2/SDE3 roles at Indian unicorns + select global companies
# Updated: 2026-06-24

title_filter:
  positive:
    # Backend / SWE roles
    - "Backend Engineer"
    - "Backend Developer"
    - "Software Engineer"
    - "Software Developer"
    - "SDE"
    - "SDE2"
    - "SDE-2"
    - "SDE 2"
    - "SDE3"
    - "Senior Software Engineer"
    - "Senior Backend"
    - "Senior Engineer"
    - "Platform Engineer"
    - "Full Stack Engineer"
    - "Full Stack Developer"
    - "Node.js"
    - "Node JS"
    # API / system design signals
    - "API Engineer"
    - "GraphQL"
    - "Distributed Systems"
    # AI integration angle
    - "AI Engineer"
    - "ML Engineer"
    - "LLM"
    - "GenAI"
    - "Agentic"
  negative:
    - "Junior"
    - "Intern"
    - "Fresher"
    - "Trainee"
    - "Data Scientist"
    - "Data Analyst"
    - "iOS"
    - "Android"
    - "Mobile"
    - "React Native"
    - "DevOps"
    - "SRE"
    - "QA"
    - "Test Engineer"
    - "Security Engineer"
    - "Embedded"
    - "Firmware"
    - "Hardware"
    - "COBOL"
    - "SAP"
    - "Mainframe"
    - "PHP"
    - "Java "
    - ".NET"
    - "C# "
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Sales"
    - "Marketing"
    - "HR"
    - "Finance"
    - "Operations"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "SDE2"
    - "SDE3"

search_queries:
  # -- LinkedIn India searches --
  - name: LinkedIn — Backend SDE2 Bangalore
    query: 'site:linkedin.com/jobs "Backend Engineer" OR "SDE2" OR "Senior Software Engineer" Bangalore "Node.js" OR "TypeScript" OR "GraphQL"'
    enabled: true

  - name: LinkedIn — Backend Engineer Indian Unicorns
    query: 'site:linkedin.com/jobs "Backend Engineer" OR "Software Engineer" "Razorpay" OR "CRED" OR "PhonePe" OR "Swiggy" OR "Groww" OR "Meesho"'
    enabled: true

  - name: LinkedIn — SDE2 Remote India
    query: 'site:linkedin.com/jobs "SDE2" OR "SDE-2" OR "Senior Backend Engineer" India remote "Node.js" OR "TypeScript"'
    enabled: true

  # -- Naukri searches --
  - name: Naukri — Senior Backend Engineer Bangalore
    query: 'site:naukri.com "Senior Backend Engineer" OR "SDE2" OR "Backend Developer" Bangalore "Node.js" OR "TypeScript" OR "GraphQL"'
    enabled: true

  - name: Naukri — Software Engineer Unicorn
    query: 'site:naukri.com "Software Engineer" "5-8 years" OR "3-6 years" Bangalore fintech OR SaaS'
    enabled: true

  # -- Instahyre / AngelList India --
  - name: Instahyre — Backend Engineer
    query: 'site:instahyre.com "Backend Engineer" OR "SDE2" OR "Senior Software Engineer" Bangalore'
    enabled: true

  - name: AngelList / Wellfound — Indian Startups Backend
    query: 'site:wellfound.com/jobs "Backend Engineer" OR "SDE" India Bangalore "Node.js" OR "TypeScript"'
    enabled: true

  # -- Global boards for Wave 3 companies --
  - name: Greenhouse — Backend / SDE Global
    query: 'site:job-boards.greenhouse.io "Backend Engineer" OR "Senior Software Engineer" India OR Bangalore OR remote'
    enabled: true

  - name: Ashby — Backend Engineer
    query: 'site:jobs.ashbyhq.com "Backend Engineer" OR "Software Engineer" India OR Bangalore OR remote'
    enabled: true

  - name: Lever — Backend Engineer India
    query: 'site:jobs.lever.co "Backend Engineer" OR "Senior Software Engineer" India OR Bangalore OR remote'
    enabled: true

  # -- Remote-first global (Wave 3) --
  - name: Remote OK — Backend / Node.js
    query: 'site:remoteok.com "Backend Engineer" OR "Node.js Engineer" OR "Senior Software Engineer" India OR remote'
    enabled: true

  - name: Himalayas — Remote Backend India
    query: 'site:himalayas.app "Backend Engineer" OR "Software Engineer" India OR remote "Node.js" OR "TypeScript"'
    enabled: true

